<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Partz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PC Partz</h1>
    </header>

    <main>
        <h2>Welcome to PC Partz</h2>
        <h3>Today's HOT Deals!</h3>
        
        <div class="products-container">
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=RTX+4090" alt="RTX 4090">
                <h4>RTX 4090</h4>
                <p>R30,000.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Ryzen+9+7950X" alt="Ryzen 9 7950X">
                <h4>Ryzen 9 7950X</h4>
                <p>R10,000.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=ASUS+ROG+Z790" alt="ASUS ROG Strix Z790-E Gaming">
                <h4>ASUS ROG Strix Z790-E Gaming</h4>
                <p>R15,000.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=G.Skill+Trident+Z5" alt="G.Skill Trident Z5 RGB 32GB">
                <h4>G.Skill Trident Z5 RGB 32GB (2x16GB) DDR5-6000</h4>
                <p>R5,000.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Samsung+970+EVO" alt="Samsung 970 EVO Plus 1TB">
                <h4>Samsung 970 EVO Plus 1TB NVMe SSD</h4>
                <p>R2,000.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            
            <div class="product">
                <img src="https://via.placeholder.com/300x200?text=Corsair+RM850x" alt="Corsair RM850x 850W PSU">
                <h4>Corsair RM850x 850W PSU</h4>
                <p>R3,000.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </div>
    </main>
</body>
</html>
</html>
